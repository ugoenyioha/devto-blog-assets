<?plantuml 1.2026.2?><svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" contentStyleType="text/css" data-diagram-type="ACTIVITY" height="820px" preserveAspectRatio="none" style="width:783px;height:820px;background:#FFFFFF;" version="1.1" viewBox="0 0 783 820" width="783px" zoomAndPan="magnify"><title>Kiro Exfiltration Attack &#8212; Kill Chain with Two Defense Points</title><defs/><g><g class="title" data-source-line="8"><text fill="#000000" font-family="Verdana" font-size="22" font-weight="bold" lengthAdjust="spacing" textLength="750.7822" x="15" y="37.1182">Kiro Exfiltration Attack &#8212; Kill Chain with Two Defense Points</text></g><ellipse cx="407.9369" cy="62.7373" fill="#FFFFFF" rx="10" ry="10" style="stroke:#000000;stroke-width:1;"/><rect fill="#FF7675" height="51.5986" rx="12.5" ry="12.5" style="stroke:#000000;stroke-width:2;" width="300.084" x="257.8949" y="92.7373"/><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="188.2334" x="267.8949" y="115.8071">1&#65039;&#8419; Attacker plants adversarial</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="280.084" x="267.8949" y="131.6064">directory name (invisible Unicode payload)</text><rect fill="#FDCB6E" height="67.3979" rx="12.5" ry="12.5" style="stroke:#000000;stroke-width:2;" width="240.1685" x="287.8527" y="164.3359"/><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="197.5073" x="297.8527" y="187.4058">2&#65039;&#8419; Agent reads directory listing</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="220.1685" x="297.8527" y="203.2051">(payload is invisible to developer,</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="94.4976" x="297.8527" y="219.0044">visible to LLM)</text><rect fill="#00B894" height="114.1294" rx="12.5" ry="12.5" style="stroke:#000000;stroke-width:2;" width="272.9985" x="271.4376" y="251.7339"/><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="8.2646" x="281.4376" y="274.8037">3&#65039;&#8419;</text><text fill="#000000" font-family="Verdana" font-size="13" font-weight="bold" lengthAdjust="spacing" textLength="100.2104" x="294.2726" y="274.8037">KILL POINT A</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="17" x="399.0533" y="274.8037">&#10060;</text><text fill="#000000" font-family="Courier" font-size="13" lengthAdjust="spacing" textLength="180.0132" x="281.4376" y="289.6001">stripInvisibleUnicode()</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="252.9985" x="281.4376" y="305.7358">strips invisible Unicode, Bidi overrides,</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="142.2637" x="281.4376" y="321.5352">zero-width characters</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="26" x="281.4376" y="337.3345">&#8212;&#8212;</text><text fill="#000000" font-family="Verdana" font-size="13" font-style="italic" lengthAdjust="spacing" textLength="238.6655" x="281.4376" y="353.1338">Payload defanged before LLM sees it</text><rect fill="#74B9FF" height="67.3979" rx="12.5" ry="12.5" style="stroke:#000000;stroke-width:2;" width="242.4028" x="286.7355" y="385.8633"/><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="222.4028" x="296.7355" y="408.9331">4&#65039;&#8419; LLM processes sanitized context</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="196.936" x="296.7355" y="424.7324">(if payload survived, LLM may</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="169.0762" x="296.7355" y="440.5317">compose exfiltration URL)</text><polygon fill="#FFFFFF" points="336.3702,473.2612,479.5035,473.2612,491.5035,489.0605,479.5035,504.8599,336.3702,504.8599,324.3702,489.0605,336.3702,473.2612" style="stroke:#000000;stroke-width:2;"/><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="96.5034" x="336.3702" y="486.3311">Overt injection</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="143.1333" x="336.3702" y="502.1304">bypassed Kill Point A?</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="113.9912" x="210.379" y="486.3311">yes &#8212; worst case</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="146.8467" x="491.5035" y="486.3311">no &#8212; payload stripped</text><rect fill="#636E72" height="51.5986" rx="12.5" ry="12.5" style="stroke:#000000;stroke-width:2;" width="224.6548" x="170.9589" y="514.8599"/><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="187.2939" x="180.9589" y="537.9297">&#9888;&#65039; Agent composes URL with</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="204.6548" x="180.9589" y="553.729">stolen secrets as query params</text><rect fill="#00B894" height="114.1294" rx="12.5" ry="12.5" style="stroke:#000000;stroke-width:2;" width="277.7085" x="144.432" y="586.4585"/><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="8.2646" x="154.432" y="609.5283">5&#65039;&#8419;</text><text fill="#000000" font-family="Verdana" font-size="13" font-weight="bold" lengthAdjust="spacing" textLength="100.02" x="167.267" y="609.5283">KILL POINT B</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="17" x="271.8573" y="609.5283">&#10060;</text><text fill="#000000" font-family="Courier" font-size="13" lengthAdjust="spacing" textLength="156.5332" x="154.432" y="624.3247">validateURLForSSRF()</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="218.188" x="154.432" y="640.4604">resolves DNS, checks IP denylist,</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="104.1777" x="154.432" y="656.2598">pins resolved IP</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="26" x="154.432" y="672.0591">&#8212;&#8212;</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="70.5479" x="154.432" y="687.8584">+ OS-level</text><text fill="#000000" font-family="Courier" font-size="13" lengthAdjust="spacing" textLength="101.7466" x="229.5502" y="687.522">--unshare-net</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="76.2734" x="335.8671" y="687.8584">blocks bash</text><rect fill="#00B894" height="51.5986" rx="12.5" ry="12.5" style="stroke:#000000;stroke-width:2;" width="214.9556" x="175.8085" y="720.5879"/><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="83.7383" x="185.8085" y="743.6577">6&#65039;&#8419; Exfiltration</text><text fill="#000000" font-family="Verdana" font-size="13" font-weight="bold" lengthAdjust="spacing" textLength="68.3389" x="274.1171" y="743.6577">BLOCKED</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="194.9556" x="185.8085" y="759.457">(no network path to attacker)</text><ellipse cx="283.2863" cy="803.1865" fill="none" rx="11" ry="11" style="stroke:#000000;stroke-width:1;"/><ellipse cx="283.2863" cy="803.1865" fill="#FFFFFF" rx="6" ry="6" style="stroke:#000000;stroke-width:1;"/><rect fill="#00B894" height="51.5986" rx="12.5" ry="12.5" style="stroke:#000000;stroke-width:2;" width="180.894" x="442.1405" y="514.8599"/><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="160.894" x="452.1405" y="537.9297">Agent operates normally</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="107.9482" x="452.1405" y="553.729">on clean context</text><ellipse cx="532.5875" cy="597.4585" fill="none" rx="11" ry="11" style="stroke:#000000;stroke-width:1;"/><ellipse cx="532.5875" cy="597.4585" fill="#FFFFFF" rx="6" ry="6" style="stroke:#000000;stroke-width:1;"/><line style="stroke:#000000;stroke-width:2;" x1="407.9369" x2="407.9369" y1="72.7373" y2="92.7373"/><polygon fill="#000000" points="403.9369,82.7373,407.9369,92.7373,411.9369,82.7373,407.9369,86.7373" style="stroke:#000000;stroke-width:1;"/><line style="stroke:#000000;stroke-width:2;" x1="407.9369" x2="407.9369" y1="144.3359" y2="164.3359"/><polygon fill="#000000" points="403.9369,154.3359,407.9369,164.3359,411.9369,154.3359,407.9369,158.3359" style="stroke:#000000;stroke-width:1;"/><line style="stroke:#000000;stroke-width:2;" x1="407.9369" x2="407.9369" y1="231.7339" y2="251.7339"/><polygon fill="#000000" points="403.9369,241.7339,407.9369,251.7339,411.9369,241.7339,407.9369,245.7339" style="stroke:#000000;stroke-width:1;"/><line style="stroke:#000000;stroke-width:2;" x1="407.9369" x2="407.9369" y1="365.8633" y2="385.8633"/><polygon fill="#000000" points="403.9369,375.8633,407.9369,385.8633,411.9369,375.8633,407.9369,379.8633" style="stroke:#000000;stroke-width:1;"/><line style="stroke:#000000;stroke-width:2;" x1="283.2863" x2="283.2863" y1="566.4585" y2="586.4585"/><polygon fill="#000000" points="279.2863,576.4585,283.2863,586.4585,287.2863,576.4585,283.2863,580.4585" style="stroke:#000000;stroke-width:1;"/><line style="stroke:#000000;stroke-width:2;" x1="283.2863" x2="283.2863" y1="700.5879" y2="720.5879"/><polygon fill="#000000" points="279.2863,710.5879,283.2863,720.5879,287.2863,710.5879,283.2863,714.5879" style="stroke:#000000;stroke-width:1;"/><line style="stroke:#000000;stroke-width:2;" x1="283.2863" x2="283.2863