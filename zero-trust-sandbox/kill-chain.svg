<?plantuml 1.2026.2?><svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" contentStyleType="text/css" data-diagram-type="ACTIVITY" height="943px" preserveAspectRatio="none" style="width:798px;height:943px;background:#FFFFFF;" version="1.1" viewBox="0 0 798 943" width="798px" zoomAndPan="magnify"><title>Kiro Exfiltration Attack &#8212; Kill Chain with Two Defense Points</title><defs/><g><rect fill="#FFFFCC" height="113.2031" rx="2.5" ry="2.5" style="stroke:#FFDD88;stroke-width:3;" width="787.7822" x="5" y="5"/><text fill="#000000" font-family="monospace" font-size="10" lengthAdjust="spacing" textLength="535.8252" x="10" y="20">This&#160;syntax&#160;is&#160;deprecated,&#160;you&#160;must&#160;add&#160;&lt;&lt;#ff7675&gt;&gt;&#160;at&#160;the&#160;end&#160;of&#160;the&#160;line,&#160;after&#160;the&#160;';'</text><text fill="#000000" font-family="monospace" font-size="10" lengthAdjust="spacing" textLength="535.8252" x="10" y="41.6406">This&#160;syntax&#160;is&#160;deprecated,&#160;you&#160;must&#160;add&#160;&lt;&lt;#fdcb6e&gt;&gt;&#160;at&#160;the&#160;end&#160;of&#160;the&#160;line,&#160;after&#160;the&#160;';'</text><text fill="#000000" font-family="monospace" font-size="10" lengthAdjust="spacing" textLength="535.8252" x="10" y="63.2813">This&#160;syntax&#160;is&#160;deprecated,&#160;you&#160;must&#160;add&#160;&lt;&lt;#00b894&gt;&gt;&#160;at&#160;the&#160;end&#160;of&#160;the&#160;line,&#160;after&#160;the&#160;';'</text><text fill="#000000" font-family="monospace" font-size="10" lengthAdjust="spacing" textLength="535.8252" x="10" y="84.9219">This&#160;syntax&#160;is&#160;deprecated,&#160;you&#160;must&#160;add&#160;&lt;&lt;#74b9ff&gt;&gt;&#160;at&#160;the&#160;end&#160;of&#160;the&#160;line,&#160;after&#160;the&#160;';'</text><text fill="#000000" font-family="monospace" font-size="10" lengthAdjust="spacing" textLength="535.8252" x="10" y="106.5625">This&#160;syntax&#160;is&#160;deprecated,&#160;you&#160;must&#160;add&#160;&lt;&lt;#636e72&gt;&gt;&#160;at&#160;the&#160;end&#160;of&#160;the&#160;line,&#160;after&#160;the&#160;';'</text><g class="title" data-source-line="8"><text fill="#000000" font-family="Verdana" font-size="22" font-weight="bold" lengthAdjust="spacing" textLength="750.7822" x="15" y="160.3213">Kiro Exfiltration Attack &#8212; Kill Chain with Two Defense Points</text></g><ellipse cx="407.9369" cy="185.9404" fill="#FFFFFF" rx="10" ry="10" style="stroke:#000000;stroke-width:1;"/><rect fill="#FFFFFF" height="51.5986" rx="12.5" ry="12.5" style="stroke:#000000;stroke-width:2;" width="300.084" x="257.8949" y="215.9404"/><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="188.2334" x="267.8949" y="239.0103">1&#65039;&#8419; Attacker plants adversarial</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="280.084" x="267.8949" y="254.8096">directory name (invisible Unicode payload)</text><rect fill="#FFFFFF" height="67.3979" rx="12.5" ry="12.5" style="stroke:#000000;stroke-width:2;" width="240.1685" x="287.8527" y="287.5391"/><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="197.5073" x="297.8527" y="310.6089">2&#65039;&#8419; Agent reads directory listing</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="220.1685" x="297.8527" y="326.4082">(payload is invisible to developer,</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="94.4976" x="297.8527" y="342.2075">visible to LLM)</text><rect fill="#FFFFFF" height="114.1294" rx="12.5" ry="12.5" style="stroke:#000000;stroke-width:2;" width="272.9985" x="271.4376" y="374.937"/><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="8.2646" x="281.4376" y="398.0068">3&#65039;&#8419;</text><text fill="#000000" font-family="Verdana" font-size="13" font-weight="bold" lengthAdjust="spacing" textLength="100.2104" x="294.2726" y="398.0068">KILL POINT A</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="17" x="399.0533" y="398.0068">&#10060;</text><text fill="#000000" font-family="Courier" font-size="13" lengthAdjust="spacing" textLength="180.0132" x="281.4376" y="412.8032">stripInvisibleUnicode()</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="252.9985" x="281.4376" y="428.939">strips invisible Unicode, Bidi overrides,</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="142.2637" x="281.4376" y="444.7383">zero-width characters</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="26" x="281.4376" y="460.5376">&#8212;&#8212;</text><text fill="#000000" font-family="Verdana" font-size="13" font-style="italic" lengthAdjust="spacing" textLength="238.6655" x="281.4376" y="476.3369">Payload defanged before LLM sees it</text><rect fill="#FFFFFF" height="67.3979" rx="12.5" ry="12.5" style="stroke:#000000;stroke-width:2;" width="242.4028" x="286.7355" y="509.0664"/><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="222.4028" x="296.7355" y="532.1362">4&#65039;&#8419; LLM processes sanitized context</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="196.936" x="296.7355" y="547.9355">(if payload survived, LLM may</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="169.0762" x="296.7355" y="563.7349">compose exfiltration URL)</text><polygon fill="#FFFFFF" points="336.3702,596.4644,479.5035,596.4644,491.5035,612.2637,479.5035,628.063,336.3702,628.063,324.3702,612.2637,336.3702,596.4644" style="stroke:#000000;stroke-width:2;"/><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="96.5034" x="336.3702" y="609.5342">Overt injection</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="143.1333" x="336.3702" y="625.3335">bypassed Kill Point A?</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="113.9912" x="210.379" y="609.5342">yes &#8212; worst case</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="146.8467" x="491.5035" y="609.5342">no &#8212; payload stripped</text><rect fill="#FFFFFF" height="51.5986" rx="12.5" ry="12.5" style="stroke:#000000;stroke-width:2;" width="224.6548" x="170.9589" y="638.063"/><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="187.2939" x="180.9589" y="661.1328">&#9888;&#65039; Agent composes URL with</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="204.6548" x="180.9589" y="676.9321">stolen secrets as query params</text><rect fill="#FFFFFF" height="114.1294" rx="12.5" ry="12.5" style="stroke:#000000;stroke-width:2;" width="277.7085" x="144.432" y="709.6616"/><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="8.2646" x="154.432" y="732.7314">5&#65039;&#8419;</text><text fill="#000000" font-family="Verdana" font-size="13" font-weight="bold" lengthAdjust="spacing" textLength="100.02" x="167.267" y="732.7314">KILL POINT B</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="17" x="271.8573" y="732.7314">&#10060;</text><text fill="#000000" font-family="Courier" font-size="13" lengthAdjust="spacing" textLength="156.5332" x="154.432" y="747.5278">validateURLForSSRF()</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="218.188" x="154.432" y="763.6636">resolves DNS, checks IP denylist,</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="104.1777" x="154.432" y="779.4629">pins resolved IP</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="26" x="154.432" y="795.2622">&#8212;&#8212;</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="70.5479" x="154.432" y="811.0615">+ OS-level</text><text fill="#000000" font-family="Courier" font-size="13" lengthAdjust="spacing" textLength="101.7466" x="229.5502" y="810.7251">--unshare-net</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="76.2734" x="335.8671" y="811.0615">blocks bash</text><rect fill="#FFFFFF" height="51.5986" rx="12.5" ry="12.5" style="stroke:#000000;stroke-width:2;" width="214.9556" x="175.8085" y="843.791"/><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="83.7383" x="185.8085" y="866.8608">6&#65039;&#8419; Exfiltration</text><text fill="#000000" font-family="Verdana" font-size="13" font-weight="bold" lengthAdjust="spacing" textLength="68.3389" x="274.1171" y="866.8608">BLOCKED</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="194.9556" x="185.8085" y="882.6602">(no network path to attacker)</text><ellipse cx="283.2863" cy="926.3896" fill="none" rx="11" ry="11" style="stroke:#000000;stroke-width:1;"/><ellipse cx="283.2863" cy="926.3896" fill="#FFFFFF" rx="6" ry="6" style="stroke:#000000;stroke-width:1;"/><rect fill="#FFFFFF" height="51.5986" rx="12.5" ry="12.5" style="stroke:#000000;stroke-width:2;" width="180.894" x="442.1405" y="638.063"/><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="160.894" x="452.1405" y="661.1328">Agent operates normally</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="107.9482" x="452.1405" y="676.9321">on clean context</text><ellipse cx="532.5875" cy="720.6616" fill="none" rx="11" ry="11" style="stro