--><g class="entity" data-qualified-name="P2.A2" data-source-line="20" id="ent0009"><rect fill="#74B9FF" height="35.7993" rx="2.5" ry="2.5" style="stroke:#000000;stroke-width:2;" width="79.6499" x="35.18" y="283.1273"/><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="59.6499" x="45.18" y="306.1971">&#129302; Agent</text></g><!--entity S2--><g class="entity" data-qualified-name="P2.S2" data-source-line="21" id="ent0010"><rect fill="#00B894" height="67.3979" rx="2.5" ry="2.5" style="stroke:#000000;stroke-width:2;" width="216.2695" x="308.87" y="267.3273"/><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="110.1265" x="318.87" y="290.3971">&#128737;&#65039; gVisor Sentry</text><text fill="#000000" font-family="Verdana" font-size="13" font-style="italic" lengthAdjust="spacing" textLength="83.9478" x="318.87" y="306.1964">(Go process)</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="196.2695" x="318.87" y="321.9958">intercepts &#183; emulates &#183; rejects</text></g><!--entity K2--><g class="entity" data-qualified-name="P2.K2" data-source-line="22" id="ent0011"><rect fill="#B2BEC3" height="51.5986" rx="2.5" ry="2.5" style="stroke:#000000;stroke-width:2;" width="142.7637" x="652.62" y="275.2273"/><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="97.5327" x="662.62" y="298.2971">&#128039; Host Kernel</text><text fill="#000000" font-family="Verdana" font-size="13" font-style="italic" lengthAdjust="spacing" textLength="122.7637" x="662.62" y="314.0964">(filtered calls only)</text></g><g class="entity" data-qualified-name="GMN15" data-source-line="31" id="ent0016"><path d="M643.3,413.7273 L643.3,471.1253 L1018.7023,471.1253 L1018.7023,423.7273 L1008.7023,413.7273 L643.3,413.7273" fill="#FFFFFF" style="stroke:#000000;stroke-width:1;"/><path d="M1008.7023,413.7273 L1008.7023,423.7273 L1018.7023,423.7273 L1008.7023,413.7273" fill="#FFFFFF" style="stroke:#000000;stroke-width:1;"/><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="280.2871" x="649.3" y="431.7971">Even if a reverse shell starts inside gVisor:</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="7.0903" x="649.3" y="447.5964">&#8226;</text><text fill="#000000" font-family="Courier" font-size="13" lengthAdjust="spacing" textLength="109.5732" x="660.9606" y="447.26">--network=none</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="164.9565" x="775.1042" y="447.5964">blocks all network access</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="354.4023" x="649.3" y="463.3958">&#8226; Sentry blocks kernel exploits from reaching the host</text></g><!--link A1 to K1--><g class="link" data-entity-1="ent0003" data-entity-2="ent0004" data-link-type="dependency" data-source-line="15" id="lnk6"><path d="M218.19,126.5273 C267.52,126.5273 346.05,126.5273 406.34,126.5273" fill="none" id="A1-to-K1" style="stroke:#000000;stroke-width:2;"/><polygon fill="#000000" points="412.34,126.5273,403.34,122.5273,407.34,126.5273,403.34,130.5273,412.34,126.5273" style="stroke:#000000;stroke-width:2;"/><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="158.0503" x="236.23" y="120.5971">syscall (SYS_mmap, ...)</text></g><!--link K1 to E1--><g class="link" data-entity-1="ent0004" data-entity-2="ent0005" data-link-type="dependency" data-source-line="16" id="lnk7"><path d="M553.78,126.5273 C588.28,126.5273 623.53,126.5273 657.45,126.5273" fill="none" id="K1-to-E1" style="stroke:#000000;stroke-width:2;"/><polygon fill="#000000" points="663.45,126.5273,654.45,122.5273,658.45,126.5273,654.45,130.5273,663.45,126.5273" style="stroke:#000000;stroke-width:2;"/><text fill="#FF0000" font-family="Verdana" font-size="13" le